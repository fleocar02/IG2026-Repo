<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Practica 22</title>
    <link rel="stylesheet" href="./css/estilos.css" />
  </head>

  <body>
    <div class="caja">
      <header>
        <h1 class="titulo">Bienvenido/a</h1>
      </header>

      <main class="principal">
        <form action="#" method="get">
            <label for="precio">Ingrese su precio</label>
            <input type="number" name="precio" id="precio" placeholder="0" />

          <br />

            <label for="descuento">Ingrese el descuento</label>
            <input
              type="number"
              name="descuento"
              id="descuento"
              placeholder="(sin %)"
            />

          <br />

          <button type="submit" name="calcular" id="calcular">Calcular</button>

          <br />

          <fieldset>
            <legend>Total</legend>
            <input
              type="number"
              name="resultado"
              id="resultado"
              placeholder="0"
              disabled
            />
          </fieldset>
        </form>
      </main>

            <a href="../index.html" class="volver"> Volver al index</a>


      <footer>
        <span class="despedida">Vuelva pronto!</span>
      </footer>
    </div>

    <script src="./js/main.js"></script>
  </body>
</html>
